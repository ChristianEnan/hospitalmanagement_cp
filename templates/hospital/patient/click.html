{% extends 'hospital/homebase.html' %}

{% block content %}

<style>
  .portal-wrapper {
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    background: linear-gradient(180deg, #fafaf8 0%, #f7f5f2 100%);
  }
  .portal-card {
    background: #ffffff;
    border-radius: 28px;
    padding: 60px 50px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(30, 42, 74, 0.08);
    max-width: 520px;
    width: 100%;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid rgba(0, 0, 0, 0.03);
    position: relative;
    overflow: hidden;
  }
  .portal-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(90deg, #d4a855, #e8c87a);
  }
  .portal-card:hover {
    transform: translateY(-12px);
    box-shadow: 0 24px 60px rgba(30, 42, 74, 0.15);
  }
  .portal-icon {
    width: 100px;
    height: 100px;
    background: linear-gradient(135deg, #1e2a4a 0%, #3d5a99 100%);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    font-size: 42px;
    color: #d4a855;
    box-shadow: 0 10px 30px rgba(30, 42, 74, 0.2);
  }
  .portal-card h2 {
    color: #1a1f36;
    margin-bottom: 12px;
    font-weight: 700;
    font-size: 32px;
    font-family: 'Playfair Display', serif;
  }
  .portal-card p {
    color: #6e685e;
    margin-bottom: 32px;
    font-size: 15px;
    line-height: 1.8;
    font-family: 'Inter', sans-serif;
  }
  .button-container {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-portal {
    padding: 14px 36px;
    border-radius: 50px;
    border: none;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: 'Inter', sans-serif;
  }
  .btn-register {
    background: linear-gradient(135deg, #1e2a4a 0%, #3d5a99 100%);
    color: #d4a855;
    box-shadow: 0 4px 16px rgba(30, 42, 74, 0.25);
  }
  .btn-register:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(30, 42, 74, 0.35);
    background: linear-gradient(135deg, #d4a855 0%, #e8c87a 100%);
    color: #1e2a4a;
    text-decoration: none;
  }
  .btn-login {
    background: linear-gradient(135deg, #d4a855 0%, #e8c87a 100%);
    color: #1e2a4a;
    box-shadow: 0 4px 20px rgba(212, 168, 85, 0.3);
  }
  .btn-login:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(212, 168, 85, 0.4);
    color: #1e2a4a;
    text-decoration: none;
  }
  .back-link {
    margin-top: 32px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #6e685e;
    font-weight: 500;
    text-decoration: none;
    font-size: 14px;
    transition: all 0.3s ease;
    font-family: 'Inter', sans-serif;
  }
  .back-link:hover {
    color: #d4a855;
    text-decoration: none;
  }
</style>

<div class="portal-wrapper">
  <div class="portal-card">
    <div class="portal-icon">
      <i class="fas fa-heartbeat"></i>
    </div>
    <h2>Patient Portal</h2>
    <p>Register to book appointments with our experienced doctors and access your medical records conveniently.</p>
    <div class="button-container">
      <a href="/patientsignup" class="btn-portal btn-register">
        <i class="fas fa-user-plus"></i> Register
      </a>
      <a href="/patientlogin" class="btn-portal btn-login">
        <i class="fas fa-sign-in-alt"></i> Login
      </a>
    </div>
    <a href="{% url 'home' %}" class="back-link">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>
  </div>
</div>

{% endblock content %}
