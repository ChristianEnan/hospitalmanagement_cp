<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.1/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <style>
    .navbar {
      box-shadow: 0 4px 30px rgba(30, 42, 74, 0.12);
      background: linear-gradient(135deg, #1e2a4a 0%, #3d5a99 100%) !important;
      padding: 14px 24px;
      backdrop-filter: blur(10px);
    }
    .navbar-brand {
      font-size: 22px;
      font-weight: 700;
      font-family: 'Playfair Display', serif !important;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .navbar-brand i {
      color: #d4a855;
      font-size: 24px;
    }
    .navbar-nav .nav-link {
      margin-left: 0.5rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif !important;
      transition: all 0.3s ease;
      position: relative;
      padding: 8px 16px !important;
      border-radius: 8px;
      font-size: 14px;
    }
    .navbar-nav .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 2px;
      background: #d4a855;
      transition: all 0.3s ease;
      transform: translateX(-50%);
    }
    .navbar-nav .nav-link:hover {
      color: #d4a855 !important;
      background: rgba(212, 168, 85, 0.1);
    }
    .navbar-nav .nav-link:hover::after {
      width: 60%;
    }
    .navbar-nav .nav-link i {
      color: #d4a855;
      margin-right: 6px;
      font-size: 13px;
    }
    .navbar-toggler {
      border: 2px solid rgba(212, 168, 85, 0.3);
      padding: 6px 10px;
    }
    .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(212, 168, 85, 1)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
    }
  </style>
</head>
<body>
  <div class="bs-example">
    <nav class="navbar navbar-expand-md navbar-dark fixed-top">
      <a href="/" class="navbar-brand"><i class="fas fa-hospital"></i> Hospital Management</a>
      <button type="button" class="navbar-toggler" data-toggle="collapse" data-target="#navbarCollapse">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-between" id="navbarCollapse">
        <div class="navbar-nav">
          {% if not request.user.is_authenticated %}
          <a href="/adminclick" class="nav-item nav-link"><i class="fas fa-user-shield"></i> Admin</a>
          <a href="/doctorclick" class="nav-item nav-link"><i class="fas fa-stethoscope"></i> Doctor</a>
          <a href="/patientclick" class="nav-item nav-link"><i class="fas fa-user"></i> Patient</a>
          {% endif %}
        </div>
        <div class="navbar-nav">
          <a href="/aboutus" class="nav-item nav-link"><i class="fas fa-info-circle"></i> About Us</a>
          <a href="/contactus" class="nav-item nav-link"><i class="fas fa-envelope"></i> Contact</a>
        </div>
      </div>
    </nav>
  </div>
</body>
</html>
